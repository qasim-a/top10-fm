AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: top10.fm — personal music chart tracker

# ── global defaults ───────────────────────────────────────────────────────────
Globals:
  Function:
    Runtime: python3.9
    Timeout: 900
    MemorySize: 256
    Environment:
      Variables:
        LASTFM_API_KEY: !Ref LastfmApiKey
        USERS_TABLE:    !Ref UsersTable
        CHARTS_TABLE:   !Ref ChartsTable
        RECORDS_TABLE:  !Ref RecordsTable
  Api:
    Cors:
      AllowMethods: "'GET,POST,OPTIONS'"
      AllowHeaders: "'Content-Type'"
      AllowOrigin:  "'*'"

# ── parameters ────────────────────────────────────────────────────────────────
Parameters:
  LastfmApiKey:
    Type: String
    Description: Last.fm API key
    NoEcho: true

# ── resources ─────────────────────────────────────────────────────────────────
Resources:

  # ── shared layer ──────────────────────────────────────────────────────────────
  SharedLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: top10fm-shared
      ContentUri: layers/shared/
      CompatibleRuntimes:
        - python3.9
      RetentionPolicy: Delete
    Metadata:
      BuildMethod: python3.9

  # ── validate user ─────────────────────────────────────────────────────────────
  ValidateUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: top10fm-validate-user
      CodeUri: functions/validate_user/
      Handler: handler.handler
      Layers:
        - !Ref SharedLayer
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ChartsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RecordsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /validate
            Method: GET

  # ── backfill trigger (fast — fires worker and returns immediately) ─────────────
  BackfillFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: top10fm-backfill
      CodeUri: functions/backfill/
      Handler: handler.handler
      Timeout: 29
      MemorySize: 256
      Layers:
        - !Ref SharedLayer
      Environment:
        Variables:
          BACKFILL_WORKER_ARN: !GetAtt BackfillWorkerFunction.Arn
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ChartsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RecordsTable
        - LambdaInvokePolicy:
            FunctionName: top10fm-backfill-worker
      Events:
        Api:
          Type: Api
          Properties:
            Path: /backfill
            Method: POST

  # ── backfill worker (heavy — runs async up to 15 min) ────────────────────────
  BackfillWorkerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: top10fm-backfill-worker
      CodeUri: functions/backfill_worker/
      Handler: handler.handler
      Timeout: 900
      MemorySize: 512
      Layers:
        - !Ref SharedLayer
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ChartsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RecordsTable

  # ── get chart ─────────────────────────────────────────────────────────────────
  GetChartFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: top10fm-get-chart
      CodeUri: functions/get_chart/
      Handler: handler.handler
      Layers:
        - !Ref SharedLayer
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ChartsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RecordsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /chart
            Method: GET

  # ── get records ───────────────────────────────────────────────────────────────
  GetRecordsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: top10fm-get-records
      CodeUri: functions/get_records/
      Handler: handler.handler
      Layers:
        - !Ref SharedLayer
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ChartsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RecordsTable
      Events:
        Api:
          Type: Api
          Properties:
            Path: /records
            Method: GET

  # ── weekly update ─────────────────────────────────────────────────────────────
  WeeklyUpdateFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: top10fm-weekly-update
      CodeUri: functions/weekly_update/
      Handler: handler.handler
      Timeout: 900
      MemorySize: 512
      Layers:
        - !Ref SharedLayer
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ChartsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RecordsTable
      Events:
        Schedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 6 ? * MON *)
            Name: top10fm-weekly-update-schedule
            Enabled: true
        Api:
          Type: Api
          Properties:
            Path: /update
            Method: POST

  # ── dynamodb tables ───────────────────────────────────────────────────────────

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: top10fm-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: username
          AttributeType: S
      KeySchema:
        - AttributeName: username
          KeyType: HASH

  ChartsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: top10fm-charts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: username
          AttributeType: S
        - AttributeName: week_start
          AttributeType: S
      KeySchema:
        - AttributeName: username
          KeyType: HASH
        - AttributeName: week_start
          KeyType: RANGE

  RecordsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: top10fm-records
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: username
          AttributeType: S
        - AttributeName: record_id
          AttributeType: S
      KeySchema:
        - AttributeName: username
          KeyType: HASH
        - AttributeName: record_id
          KeyType: RANGE

# ── outputs ───────────────────────────────────────────────────────────────────
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod"
  ValidateUrl:
    Description: Validate user endpoint
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/validate"
  BackfillUrl:
    Description: Backfill endpoint
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/backfill"
  GetChartUrl:
    Description: Get chart endpoint
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/chart"
  WeeklyUpdateUrl:
    Description: Weekly update endpoint
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/update"
  GetRecordsUrl:
    Description: Get records endpoint
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/records"